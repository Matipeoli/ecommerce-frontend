<div class="cart-item">
  <div class="item-emoji">{{ item.product.emoji }}</div>

  <div class="item-info">
    <p class="item-name">{{ item.product.name }}</p>
    <p class="item-price">${{ item.product.price }} c/u</p>
  </div>

  <div class="item-controls">
    <button
      class="qty-btn"
      [disabled]="item.quantity <= 1"
      (click)="quantityChange.emit(item.quantity - 1)"
    >−</button>
    <span class="qty-value">{{ item.quantity }}</span>
    <button class="qty-btn" (click)="quantityChange.emit(item.quantity + 1)">+</button>
  </div>

  <div class="item-subtotal">${{ subtotal }}</div>

  <button class="remove-btn" (click)="remove.emit()" title="Eliminar">
    <i class="pi pi-trash"></i>
  </button>
</div>
